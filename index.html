     ※ appearance:none は付けない(プレースホルダ '年/月/日' とカレンダーicon が消え、

/* ---------- 部スケジュール・テンプレート ---------------------------------
   各 type は { bu, dur, restAfter[], firstStart } で表現。
   restAfter[i] = i部の後の休憩(分)。受付は開始15分前〜終了15分前。   */
const RECEIPT_BEFORE = 15;   // 受付開始: 開始の何分前
const RECEIPT_CUT    = 15;   // 受付締切: 終了の何分前
const TEMPLATES = {

/* ---------- 時刻ユーティリティ ---------- */
const pad=n=>String(n).padStart(2,"0");
const toMin=t=>{ if(!t) return 0; const[h,m]=t.split(":").map(Number); return h*60+m; };
const toHM =m=>`${pad(Math.floor(m/60)%24)}:${pad(((m%60)+60)%60)}`;
function buildSchedule(tpl){
  // returns [{bu_no,start_time,end_time,receipt_open,receipt_close}]
  const out=[]; let s=toMin(tpl.firstStart);
  for(let i=0;i<tpl.bu;i++){
    const e=s+tpl.dur;
    out.push({
      bu_no:i+1,
      start_time:toHM(s)+":00",
      end_time:toHM(e)+":00",
      receipt_open:toHM(s-RECEIPT_BEFORE)+":00",
      receipt_close:toHM(e-RECEIPT_CUT)+":00",
      topic:null
    });
    if(i<tpl.bu-1) s = e + (tpl.restAfter[i]??30);
  }
  return out;
}
const EVENT_TYPE_LABEL={
  kojin_online:"個別オンライン", kojin_akushu:"個別握手会",
  zenkoku_online:"全国オンライン", real_meetgreet:"リアルミーグリ", custom:"カスタム"
};

/* ---------- グローバル状態 ---------- */
let sb=null, USER=null;
const DB={ groups:[],members:[],releases:[],events:[],sessions:[],applications:[] };
let SETTINGS={ yearGoal:0 };

/* ---------- 同期ステータス ---------- */
function setSync(state,txt){
  const el=document.getElementById("syncBadge"); if(!el) return;
  el.className="sync "+(state||"");
  el.querySelector(".lbl").textContent=txt||({ok:"同期済み",saving:"保存中…",err:"エラー"}[state]||"—");
}
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---------- テーブル名プレフィックス -----------------------------------
   家計簿プロジェクトと同じDBに同居するため、本ツールのテーブルは mg_ 接頭。
   ローカルの DB オブジェクトのキーは接頭なしのまま、Supabase送信時のみ付与。 */
const TBL_PREFIX="mg_";
const tbl=name=>TBL_PREFIX+name;

/* ---------- データ取得(開いた時に読み込む方式) ---------- */
async function loadAll(){
  setSync("saving","読込中…");
  const tables=["groups","members","releases","events","sessions","applications"];
  for(const t of tables){
    const {data,error}=await sb.from(tbl(t)).select("*");
    if(error){ console.error(t,error); setSync("err"); toast("読込失敗: "+t); return false; }
    DB[t]=data||[];
  }
  const {data:st}=await sb.from(tbl("app_settings")).select("data").eq("user_id",USER.id).maybeSingle();
  if(st&&st.data) SETTINGS=Object.assign({yearGoal:0},st.data);
  setSync("ok"); 
  return true;
}

/* ---------- 汎用 upsert / insert / delete(楽観的更新は呼び出し側) ----------
   呼び出し側は接頭なしの論理名("events"等)を渡す。ここで mg_ を付ける。 */
async function dbInsert(table,row){
  row.user_id=USER.id;
  const {data,error}=await sb.from(tbl(table)).insert(row).select().single();
  if(error){ setSync("err"); toast("保存失敗"); throw error; }
  setSync("ok"); return data;
}
async function dbUpdate(table,id,patch){
  setSync("saving");
  const {data,error}=await sb.from(tbl(table)).update(patch).eq("id",id).select().single();
  if(error){ setSync("err"); toast("更新失敗"); throw error; }
  setSync("ok"); return data;
}
async function dbDelete(table,id){
  setSync("saving");
  const {error}=await sb.from(tbl(table)).delete().eq("id",id);
  if(error){ setSync("err"); toast("削除失敗"); throw error; }
  setSync("ok");
}
async function saveSettings(){
  setSync("saving");
  await sb.from(tbl("app_settings")).upsert({user_id:USER.id,data:SETTINGS,updated_at:new Date().toISOString()});
  setSync("ok");
}

/* ---------- 派生ヘルパ ---------- */
const byId=(arr,id)=>arr.find(x=>x.id===id);
const sessionsOf=eid=>DB.sessions.filter(s=>s.event_id===eid).sort((a,b)=>a.bu_no-b.bu_no);
// 応募行(メンバー×部×回次)。session単位 / session×member単位 で取得。
const appsOf=sid=>DB.applications.filter(a=>a.session_id===sid);
const appsOfSM=(sid,mid)=>DB.applications.filter(a=>a.session_id===sid&&a.member_id===mid).sort((a,b)=>a.round-b.round);
// その部の当選合計(全メンバー)。homeや一覧の「当選枚数」表示用。
const wonOfSession=sid=>appsOf(sid).reduce((n,a)=>n+(a.won||0),0);
// そのイベントに登場するメンバーID一覧(応募行があるメンバー)。
const membersInEvent=eid=>{
  const set=new Set();
  sessionsOf(eid).forEach(s=>appsOf(s.id).forEach(a=>set.add(a.member_id)));
  return [...set];
};
const eventsOf=rid=>DB.events.filter(e=>e.release_id===rid).sort((a,b)=>(a.event_date>b.event_date?1:-1));
function memberName(id){ const m=byId(DB.members,id); return m?m.name:"?"; }
function releaseLabel(id){ const r=byId(DB.releases,id); return r?r.label:"?"; }
function membersOfGroup(gid){ return DB.members.filter(m=>m.group_id===gid).sort((a,b)=>a.sort_order-b.sort_order); }
function eventTitle(e){
  const r=byId(DB.releases,e.release_id);
  return `${r?r.label:""} / ${e.event_date} ${EVENT_TYPE_LABEL[e.event_type]||""}`;
}

async function doAuth(mode){
  const email=$("#authEmail").value.trim(), pw=$("#authPw").value;
  const msg=$("#authMsg");
  if(!email||!pw){ msg.textContent="メールとパスワードを入力してください。"; return; }
  msg.textContent="処理中…";
  try{
    const fn = mode==="up" ? sb.auth.signUp({email,password:pw})
                           : sb.auth.signInWithPassword({email,password:pw});
    const {data,error}=await fn;
    if(error){ msg.textContent="⚠ "+error.message; return; }
    if(mode==="up" && !data.session){ msg.textContent="✉ 確認メールを送信しました。認証後にログインしてください。"; return; }
    await boot();
  }catch(e){ msg.textContent="⚠ "+e.message; }
}

/* =========================================================================
   TAB 1: 今日 / カウントダウン
   ========================================================================= */
let countdownTimer=null;
function renderHome(){
  const el=$("#tab-home");
  const today=new Date(); const ymd=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  // 今日参加する部(当選>0)を抽出
  const todayEvents=DB.events.filter(e=>e.event_date===ymd);
  let todaySessions=[];
  todayEvents.forEach(e=>{
    sessionsOf(e.id).forEach(s=>{
      const won=wonOfSession(s.id);
      if(won>0) todaySessions.push({e,s,won});
    });
  });
  todaySessions.sort((a,b)=>toMin(a.s.receipt_close)-toMin(b.s.receipt_close));

  // 今後の応募/開催の締切タイムライン(開催日基準・未来分)
  const upcoming=DB.events
    .filter(e=>e.event_date>=ymd)
    .sort((a,b)=>a.event_date>b.event_date?1:-1).slice(0,8);

  let html=`<div style="height:6px"></div>`;

  // --- カウントダウン主役 ---
  if(todaySessions.length){
    html+=`<div class="card" style="border-color:var(--acc-d);background:linear-gradient(180deg,#241f10,var(--card))">
      <h3 style="color:var(--acc)">本日の受付締切</h3>
      <div id="cdList"></div>
      <p class="dim" style="font-size:11px;margin:10px 0 0">締切を過ぎると参加できません。各部 終了15分前が締切です。</p>
    </div>`;
  }else{
    html+=`<div class="card">
      <h3>本日の予定</h3>
      <div class="empty"><span class="big">\u2615</span>今日の参加予定(当選)はありません。<br>「記録」タブで当選を入力すると、ここに受付締切カウントダウンが出ます。</div>
    </div>`;
  }

  // --- 直近の開催タイムライン ---
  html+=`<div class="card"><h3>直近の開催</h3>`;
  if(!upcoming.length){
    html+=`<div class="empty"><span class="big">\u{1F5D3}\uFE0F</span>予定がありません。「記録」から追加してください。</div>`;
  }else{
    html+=upcoming.map(e=>{
      const ss=sessionsOf(e.id);
      const won=ss.reduce((n,s)=>n+wonOfSession(s.id),0);
      const dleft=daysLeft(e.event_date);
      const dpill = dleft===0?`<span class="pill close">本日</span>`
                  : dleft>0?`<span class="pill info">あと${dleft}日</span>`:"";
      return `<div class="row" style="padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer"
                   onclick="openEvent('${e.id}')">
        <div class="grow">
          <div style="font-weight:600">${esc(e.event_date)} <span class="dim" style="font-weight:400">${EVENT_TYPE_LABEL[e.event_type]||""}</span></div>
          <div class="dim" style="font-size:12px">${esc(releaseLabel(e.release_id))} ・ ${esc(e.venue||"")} ${won?`・ 当選 ${won}枚`:""}</div>
        </div>${dpill}
      </div>`;
    }).join("");
  }
  html+=`</div>`;

  // --- 年間サマリ ---
  const stat=yearStats(today.getFullYear());
  html+=`<div class="card"><h3>${today.getFullYear()}年 サマリ</h3>
    <div class="grid3">
      ${miniStat("参加(当選)枚数",stat.won+"枚")}
      ${miniStat("開催数",stat.events+"件")}
      ${miniStat("応募 当選率",stat.rate)}
    </div></div>`;

  // --- 設定/バックアップ ---
  html+=`<div class="card"><h3>設定・バックアップ</h3>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button class="btn sm ghost" onclick="exportJSON()">\u{1F4E5} JSONバックアップ</button>
      <button class="btn sm ghost" onclick="logout()" style="margin-left:auto">ログアウト</button>
    </div>
    <p class="dim" style="font-size:11px;margin:10px 0 0">データはSupabaseに自動保存。別端末では同じアカウントでログイン→再読み込みで最新が反映されます。</p>
  </div>`;

  el.innerHTML=html;
  if(todaySessions.length) startCountdown(todaySessions);
}

function miniStat(label,val){
  return `<div style="background:var(--bg2);border-radius:10px;padding:11px">
    <div class="dim" style="font-size:11px">${label}</div>
    <div style="font-size:19px;font-weight:700;margin-top:2px">${val}</div></div>`;
}
function daysLeft(ymd){
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(ymd+"T00:00:00");
  return Math.round((d-t)/86400000);
}
function yearStats(year){
  let won=0,events=0,applied=0;
  DB.events.forEach(e=>{
    if(!e.event_date.startsWith(year+"-")) return;
    events++;
    sessionsOf(e.id).forEach(s=>{
      appsOf(s.id).forEach(ap=>{applied+=ap.applied||0;won+=ap.won||0;});
    });
  });
  return {won,events,rate:applied?Math.round(won/applied*100)+"%":"—"};
}
function startCountdown(list){
  if(countdownTimer) clearInterval(countdownTimer);
  const tick=()=>{
    const box=$("#cdList"); if(!box){clearInterval(countdownTimer);return;}
    const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
    box.innerHTML=list.map(({e,s,won})=>{
      const cut=toMin(s.receipt_close);
      const diff=cut-nowMin;
      let cls="info",txt="";
      if(diff<=0){ cls="close"; txt="締切終了"; }
      else { const h=Math.floor(diff/60),m=Math.floor(diff%60),sec=Math.floor((diff*60)%60);
        txt=`${h>0?h+"時間":""}${pad(m)}分${pad(sec)}秒`; if(diff<=30) cls="close"; else if(diff<=60) cls="open"; }
      return `<div class="row" style="padding:10px 0;border-bottom:1px solid var(--line)">
        <div class="grow">
          <div style="font-weight:600">${s.bu_no}部 <span class="dim" style="font-weight:400">${s.start_time.slice(0,5)}–${s.end_time.slice(0,5)}</span></div>
          <div class="dim" style="font-size:12px">締切 ${s.receipt_close.slice(0,5)} ・ ${esc(memberWonStr(s.id))} ・ 当選${won}枚</div>
        </div>
        <div style="text-align:right">
          <div class="pill ${cls}" style="font-variant-numeric:tabular-nums;font-size:14px;padding:5px 11px">${txt}</div>
        </div></div>`;
    }).join("");
  };
  tick(); countdownTimer=setInterval(tick,1000);
}
function memberWonStr(sid){
  const byMem={};
  appsOf(sid).forEach(a=>{ if(a.won>0) byMem[a.member_id]=(byMem[a.member_id]||0)+a.won; });
  const a=Object.entries(byMem).map(([mid,w])=>`${memberName(mid)}${w}`);
  return a.join(" ")||"—";
}

/* ---------- イベント詳細(対象メンバー × 部ごとの入力) ----------
   応募行動の単位は「特定メンバーのその部」。上部でメンバーを選び、
   各部カードにそのメンバーの回次別 申請/当選 を入力する。 */
let detailMemberId=null;  // 現在表示中の対象メンバー
function renderEventDetail(el){
  const e=byId(DB.events,selectedEventId);
  const ss=sessionsOf(e.id);
  const gid=byId(DB.releases,e.release_id)?.group_id;
  const groupMembers=membersOfGroup(gid);

  // 対象メンバーの決定: 既存応募があるメンバー優先 → オシ → 先頭
  const inEvent=membersInEvent(e.id);
  if(!detailMemberId || !groupMembers.some(m=>m.id===detailMemberId)){
    detailMemberId = inEvent[0]
      || (groupMembers.find(m=>m.is_oshi)?.id)
      || (groupMembers[0]?.id) || null;
  }

  let html=`<div class="row" style="margin:6px 0 14px">
    <button class="btn sm ghost" onclick="selectedEventId=null;detailMemberId=null;renderEvents()">\u2039 一覧</button>
    <h2 style="font-size:17px;margin-left:6px">${esc(e.event_date)} ${EVENT_TYPE_LABEL[e.event_type]}</h2>
  </div>`;

  html+=`<div class="card"><div class="row">
    <div class="grow"><div class="dim" style="font-size:12px">${esc(releaseLabel(e.release_id))}</div>
    <div style="font-weight:600">${esc(e.venue||"")}</div></div>
    <button class="btn sm ghost danger" onclick="delEvent('${e.id}')">削除</button>
  </div></div>`;

  // --- 対象メンバー選択 ---

    <h3 style="color:var(--acc)">対象メンバー</h3>
    <div class="row" style="gap:8px">
      <select id="detailMember" onchange="changeDetailMember(this.value)" class="grow">
        ${groupMembers.map(m=>`<option value="${m.id}" ${m.id===detailMemberId?"selected":""}>${esc(m.name)}${m.is_oshi?" ★":""}</option>`).join("")}
        <option value="__new">＋ 新しいメンバー…</option>
      </select>
    </div>
    <p class="dim" style="font-size:11px;margin:8px 0 0">応募・当選はこのメンバーの記録として保存されます。当選率もメンバー別に集計されます。</p>
  </div>`;

  if(!detailMemberId){
    html+=`<div class="card"><div class="empty">メンバーがいません。上の「＋ 新しいメンバー…」で追加してください。</div></div>`;
    el.innerHTML=html; return;
  }

  // --- 部ごとカード(対象メンバーの回次別 申請/当選) ---
  ss.forEach(s=>{
    const apps=appsOfSM(s.id,detailMemberId);
    const wonTotal=apps.reduce((n,a)=>n+(a.won||0),0);
    const appTotal=apps.reduce((n,a)=>n+(a.applied||0),0);
    const rateAll=appTotal?Math.round(wonTotal/appTotal*100):null;
    html+=`<div class="card">
      <div class="row">
        <h3 style="text-transform:none;color:var(--txt);font-size:15px">${s.bu_no}部

      </div>
      <div class="row" style="gap:6px;margin:8px 0">
        <input type="text" value="${esc(s.topic||"")}" placeholder="トークメモ(例: 乃木恋 / 誕生日)"
          onchange="updTopic('${s.id}',this.value)" style="font-size:13px;padding:7px 9px">
        <button class="btn sm ghost" onclick="editTimes('${s.id}')">時刻編集</button>
      </div>

      <div class="row" style="margin:10px 0 4px">
        <span style="font-size:12px;color:var(--txt2)">応募 / 当選 (回次別)</span>
        ${rateAll!=null?`<span class="dim" style="font-size:11px;margin-left:auto">この部 計 当選${wonTotal}/申請${appTotal} ・ ${rateAll}%</span>`:""}
      </div>
      <table style="font-size:13px"><tr class="dim" style="font-size:11px">
        <td>回次</td><td style="text-align:center">申請</td><td style="text-align:center">当選</td><td style="text-align:center">当選率</td><td></td></tr>
        ${apps.map(a=>`<tr>
          <td style="padding:4px 0">${a.round}次</td>
          <td style="text-align:center"><input type="number" min="0" value="${a.applied}" style="width:60px;text-align:center;padding:5px"
              onchange="updApp('${a.id}','applied',this.value)"></td>
          <td style="text-align:center"><input type="number" min="0" value="${a.won}" style="width:60px;text-align:center;padding:5px"
              onchange="updApp('${a.id}','won',this.value)"></td>
          <td style="text-align:center;font-weight:600;color:${a.applied?(a.won/a.applied>=.5?'var(--ok)':a.won/a.applied>=.3?'var(--warn)':'var(--danger)'):'var(--txt3)'}">

          <td style="text-align:right"><button class="btn sm ghost danger" style="padding:3px 7px" onclick="delApp('${a.id}')">×</button></td>

      </table>
      <button class="btn sm ghost" style="margin-top:6px" onclick="addApp('${s.id}')">＋ 回次を追加</button>
    </div>`;
  });

  el.innerHTML=html;
}
async function changeDetailMember(v){
  if(v==="__new"){
    const name=prompt("メンバー名を入力(例: 賀喜遥香)");

    const gid=byId(DB.releases, byId(DB.events,selectedEventId).release_id).group_id;

/* ---------- 入力ハンドラ(楽観的更新) ---------- */
async function updTopic(sid,v){ const s=byId(DB.sessions,sid); s.topic=v; await dbUpdate("sessions",sid,{topic:v}); }
async function updApp(id,field,v){ const a=byId(DB.applications,id); a[field]=+v||0; renderEvents();
  await dbUpdate("applications",id,{[field]:+v||0}); }
async function addApp(sid){
  if(!detailMemberId){ toast("対象メンバーを選んでください"); return; }
  const ex=appsOfSM(sid,detailMemberId).map(a=>a.round); let r=1; while(ex.includes(r)) r++;
  const row=await dbInsert("applications",{session_id:sid,member_id:detailMemberId,round:r,applied:0,won:0});
  DB.applications.push(row); renderEvents();
}
async function delApp(id){ DB.applications=DB.applications.filter(a=>a.id!==id); renderEvents(); await dbDelete("applications",id); }

function editTimes(sid){
  const s=byId(DB.sessions,sid);
  openModal(`${s.bu_no}部 時刻編集`,`
    <div class="grid2">
      <div class="field"><label class="fld">開始</label><input type="time" id="t_start" value="${s.start_time.slice(0,5)}"></div>

  `,async()=>{
    const st=$("#t_start").value, en=$("#t_end").value;
    const ro=$("#t_ro").value || toHM(toMin(st)-RECEIPT_BEFORE);

async function delEvent(id){
  if(!confirm("この開催日と紐づく部・応募・当選をすべて削除します。よろしいですか?")) return;
  await dbDelete("events",id);
  DB.events=DB.events.filter(e=>e.id!==id);
  const sids=DB.sessions.filter(s=>s.event_id===id).map(s=>s.id);
  DB.sessions=DB.sessions.filter(s=>s.event_id!==id);
  DB.applications=DB.applications.filter(a=>!sids.includes(a.session_id));
  selectedEventId=null; renderEvents();
}
async function delRelease(id){
  if(!confirm("このリリースと配下の全データを削除します。よろしいですか?")) return;
  await dbDelete("releases",id);
  DB.releases=DB.releases.filter(r=>r.id!==id);
  DB.events=DB.events.filter(e=>e.release_id!==id);
  renderEvents();
}

/* =========================================================================
   TAB 3: 当選率 統計 … メンバー別・時間帯(部)別の歴代当選率
   応募行動は「特定メンバーの部」が単位。メンバーを選んで集計する。

let statsMemberId=null, statsType="all";

  // 応募データがあるメンバーのみ(なければオシ→全員)
  const ids=[...new Set(DB.applications.map(a=>a.member_id))];
  if(ids.length) return DB.members.filter(m=>ids.includes(m.id));
  return DB.members;
}
function renderStats(){
  const el=$("#tab-stats");
  const cand=membersWithData();
  if(!statsMemberId || !cand.some(m=>m.id===statsMemberId)){
    statsMemberId=(cand.find(m=>m.is_oshi)?.id)||(cand[0]?.id)||null;
  }

  let html=`<h2 style="font-size:19px;margin:6px 0 12px">歴代 当選率</h2>`;

  if(!statsMemberId){
    html+=`<div class="card"><div class="empty"><span class="big">\u{1F4CA}</span>
      まだ応募データがありません。<br>「記録」で対象メンバーの申請・当選を入力すると、メンバー別の当選率がここに出ます。</div></div>`;
    el.innerHTML=html; return;
  }

  // メンバー & 種別フィルタ
  html+=`<div class="card">
    <div class="field"><label class="fld">対象メンバー</label>
      <select id="statsMember" onchange="statsMemberId=this.value;renderStats()">
        ${membersWithData().map(m=>`<option value="${m.id}" ${m.id===statsMemberId?"selected":""}>${esc(m.name)}${m.is_oshi?" ★":""}</option>`).join("")}
      </select></div>
    <div class="field" style="margin-bottom:0"><label class="fld">種別</label>
      <select id="statsType" onchange="statsType=this.value;renderStats()">
        <option value="all" ${statsType==="all"?"selected":""}>すべて</option>
        ${Object.entries(EVENT_TYPE_LABEL).map(([k,v])=>`<option value="${k}" ${statsType===k?"selected":""}>${esc(v)}</option>`).join("")}
      </select></div>
  </div>`;

  // 集計: 対象メンバー × (種別) の時間帯別
  const byStart={};
  DB.sessions.forEach(s=>{
    const ev=byId(DB.events,s.event_id); if(!ev) return;
    if(statsType!=="all" && ev.event_type!==statsType) return;
    DB.applications.filter(a=>a.session_id===s.id && a.member_id===statsMemberId).forEach(a=>{
      const key=s.start_time.slice(0,5);
      (byStart[key]=byStart[key]||{applied:0,won:0,n:0});
      byStart[key].applied+=a.applied||0; byStart[key].won+=a.won||0; byStart[key].n++;
    });
  });
  const rows=Object.entries(byStart).map(([t,v])=>({t,...v,rate:v.applied?v.won/v.applied:null}))
    .filter(r=>r.applied>0).sort((a,b)=>toMin(a.t)-toMin(b.t));

  if(!rows.length){
    html+=`<div class="card"><div class="empty">この条件の応募データがありません。</div></div>`;
    el.innerHTML=html; return;
  }
  const best=rows.reduce((a,b)=>(b.rate>a.rate?b:a));
  html+=`<div class="card" style="border-color:var(--acc-d)">
    <h3 style="color:var(--acc)">最も当たりやすい時間帯</h3>
    <div style="font-size:26px;font-weight:700">${best.t} <span style="font-size:16px;color:var(--ok)">${Math.round(best.rate*100)}%</span></div>
    <div class="dim" style="font-size:12px">${esc(memberName(statsMemberId))} の応募実績より。同じ応募枚数ならこの時間帯の部が有利な傾向です。</div></div>`;

  const max=Math.max(...rows.map(r=>r.rate));
  html+=`<div class="card"><h3>時間帯別 当選率</h3>`;
  rows.forEach(r=>{
    const pct=Math.round(r.rate*100);
    const col=r.rate>=.5?'var(--ok)':r.rate>=.3?'var(--warn)':'var(--danger)';
    html+=`<div style="margin:11px 0">
      <div class="row" style="font-size:13px;margin-bottom:4px">
        <span style="font-weight:600;width:52px">${r.t}</span>
        <span class="dim grow" style="font-size:12px">当選${r.won}/申請${r.applied} ・ ${r.n}部分</span>
        <span style="font-weight:700;color:${col}">${pct}%</span></div>
      <div style="height:8px;background:var(--bg2);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${(r.rate/max*100).toFixed(0)}%;background:${col};border-radius:6px"></div></div>
    </div>`;
  });
  html+=`</div>`;

  // 回次別 当選率(対象メンバー)
  html+=`<div class="card"><h3>回次別 当選率 <span class="dim" style="font-weight:400;font-size:12px;text-transform:none">(${esc(memberName(statsMemberId))})</span></h3>`;
  const byRound={};
  DB.applications.filter(a=>a.member_id===statsMemberId).forEach(a=>{
    const ev=byId(DB.events, (byId(DB.sessions,a.session_id)||{}).event_id);
    if(statsType!=="all" && ev && ev.event_type!==statsType) return;
    (byRound[a.round]=byRound[a.round]||{applied:0,won:0});byRound[a.round].applied+=a.applied||0;byRound[a.round].won+=a.won||0;
  });
  const rr=Object.entries(byRound).filter(([k,v])=>v.applied>0).sort((a,b)=>a[0]-b[0]);
  if(!rr.length){ html+=`<div class="dim" style="font-size:13px">データなし</div>`; }
  else rr.forEach(([round,v])=>{
    const pct=Math.round(v.won/v.applied*100);
    html+=`<div class="row" style="padding:7px 0;border-bottom:1px solid var(--line)">
      <span style="font-weight:600;width:52px">${round}次</span>
      <span class="dim grow" style="font-size:12px">当選${v.won}/申請${v.applied}</span>
      <span style="font-weight:700">${pct}%</span></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

/* =========================================================================
   TAB 4: 応募計算(シミュレーション)
   対象メンバーを選び、各部に応募枚数を割り振り、そのメンバーの
   歴代当選率から期待当選を試算する。
   ========================================================================= */
let simMemberId=null;
function renderSim(){
  const el=$("#tab-sim");
  const cand=membersWithData();
  if(!simMemberId || !cand.some(m=>m.id===simMemberId)){
    simMemberId=(cand.find(m=>m.is_oshi)?.id)||(cand[0]?.id)||null;
  }

  let html=`<h2 style="font-size:19px;margin:6px 0 8px">応募シミュレーション</h2>
    <p class="dim" style="font-size:13px;margin:0 0 14px">対象メンバーと種別を選び、各部に応募枚数を入れると、そのメンバーの歴代当選率から期待当選を試算します。</p>`;

  html+=`<div class="card">
    <div class="field"><label class="fld">対象メンバー</label>
      <select id="simMember" onchange="simMemberId=this.value;renderSim()">
        ${(cand.length?cand:DB.members).map(m=>`<option value="${m.id}" ${m.id===simMemberId?"selected":""}>${esc(m.name)}${m.is_oshi?" ★":""}</option>`).join("")}
      </select></div>
    <div class="field" style="margin-bottom:0"><label class="fld">種別</label>
      <select id="simType" onchange="simBuild()">
        ${Object.entries(TEMPLATES).filter(([k])=>k!=="custom").map(([k,t])=>`<option value="${k}">${esc(t.label)}</option>`).join("")}</select></div>
    <div id="simRows" style="margin-top:12px"></div>
    <div class="grid3" style="margin-top:14px">
      ${miniStat("応募 合計","<span id='simApp'>0</span>枚")}
      ${miniStat("期待当選","<span id='simExp'>0.0</span>枚")}
      ${miniStat("期待当選率","<span id='simRate'>—</span>")}
    </div>
    <p class="dim" style="font-size:11px;margin:10px 0 0">当選率は選択メンバーの歴代平均(データが無い時間帯はそのメンバーの全体平均で代用)。確率の目安です。</p>
  </div>`;
  el.innerHTML=html;
  simBuild();
}
function simBuild(){
  const el=$("#tab-sim");
  // 選択メンバーの時間帯別当選率を集計
  const byStart={};
  if(simMemberId){
    DB.sessions.forEach(s=>{
      DB.applications.filter(a=>a.session_id===s.id && a.member_id===simMemberId).forEach(a=>{
        const k=s.start_time.slice(0,5);(byStart[k]=byStart[k]||{applied:0,won:0});
        byStart[k].applied+=a.applied||0;byStart[k].won+=a.won||0;});
    });
  }
  const tpl=TEMPLATES[($("#simType")||{}).value||"real_meetgreet"];
  const sched=buildSchedule(tpl);
  let gA=0,gW=0; Object.values(byStart).forEach(v=>{gA+=v.applied;gW+=v.won;});
  const globalRate=gA?gW/gA:0.4;
  const box=$("#simRows"); if(!box) return;
  box.innerHTML=sched.map((s,i)=>{
    const k=s.start_time.slice(0,5);
    const v=byStart[k]; const rate=(v&&v.applied)?v.won/v.applied:globalRate;
    const col=rate>=.5?'var(--ok)':rate>=.3?'var(--warn)':'var(--danger)';
    const known=!!(v&&v.applied);
    return `<div class="row" style="padding:9px 0;border-bottom:1px solid var(--line);gap:10px" data-rate="${rate}">
      <div style="width:70px"><div style="font-weight:600">${s.bu_no}部</div><div class="dim" style="font-size:11px">${k}</div></div>
      <input type="number" min="0" value="2" style="width:62px;text-align:center;padding:6px" oninput="simCalc()" class="simInput">
      <span style="font-size:12px;color:${col};width:96px">当選率 ${Math.round(rate*100)}%${known?"":" <span class='dim'>(平均)</span>"}</span>
      <span class="grow" style="text-align:right;font-weight:700">期待 <span class="expCell">0.0</span></span>
    </div>`;
  }).join("");
  simCalc();
}
function simCalc(){
  const rows=document.querySelectorAll("#simRows .row");
  let totA=0,totE=0;
  rows.forEach(r=>{
    const rate=+r.dataset.rate; const v=+r.querySelector(".simInput").value||0;
    const e=v*rate; totA+=v; totE+=e;
    r.querySelector(".expCell").textContent=e.toFixed(1);
  });
  $("#simApp").textContent=totA;
  $("#simExp").textContent=totE.toFixed(1);
  $("#simRate").textContent=totA?Math.round(totE/totA*100)+"%":"—";
}

/* =========================================================================
   モーダル / 設定 / バックアップ
   ========================================================================= */
function openModal(title,bodyHtml,onOk){
  const wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;padding:0";
  wrap.innerHTML=`<div style="background:var(--card);border:1px solid var(--line2);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:88vh;overflow:auto;padding:18px 18px calc(20px + env(safe-area-inset-bottom))">
    <div class="row" style="margin-bottom:14px"><h2 style="font-size:17px">${esc(title)}</h2>
      <button class="btn sm ghost" style="margin-left:auto" id="mClose">閉じる</button></div>
    <div id="mBody">${bodyHtml}</div>
    <div class="row" style="margin-top:16px;gap:8px">
      <button class="btn ghost grow" id="mCancel">キャンセル</button>
      <button class="btn primary grow" id="mOk">保存</button></div>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>wrap.remove();
  wrap.querySelector("#mClose").onclick=close;
  wrap.querySelector("#mCancel").onclick=close;
  wrap.querySelector("#mOk").onclick=async()=>{
    const ok=await onOk(); if(ok!==false){ close();
      if(activeTab==="events")renderEvents(); if(activeTab==="home")renderHome(); }
  };
  wrap.onclick=e=>{ if(e.target===wrap) close(); };
}

function exportJSON(){
  const blob={exported:new Date().toISOString(),settings:SETTINGS,data:DB};
  const s=JSON.stringify(blob,null,2);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([s],{type:"application/json"}));
  a.download=`akushukai_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast("JSONを書き出しました");
}

/* =========================================================================
   ブート
   ========================================================================= */
async function boot(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){ renderAuth(); return; }
  USER=user;
  renderShell();
  const ok=await loadAll();
  if(ok) switchTab(activeTab);
}
async function init(){
  if(!window.supabase || SUPA_URL.includes("YOUR-PROJECT")){
    $("#app").innerHTML=`<div class="wrap" style="padding-top:12vh">
      <div class="card"><h3 style="color:var(--danger)">セットアップ未完了</h3>
      <p class="muted">index.html 冒頭の <code>SUPA_URL</code> と <code>SUPA_KEY</code> に、Supabase の Project URL と anon public key を貼り付けてください。</p>
      <p class="dim" style="font-size:12px">同梱の <code>supabase_schema.sql</code> を SQL Editor で実行後、このページを再読み込みしてください。</p></div></div>`;
    return;
  }
  sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  sb.auth.onAuthStateChange((ev)=>{ if(ev==="SIGNED_OUT"){ USER=null; renderAuth(); } });
  await boot();
}
window.addEventListener("DOMContentLoaded",init);
window.logout=async()=>{ await sb.auth.signOut(); };
